services:
  db:
    image: postgres:16
    restart: always
    volumes:
      - oil_tracker_db_data:/var/lib/postgresql/data
    env_file: .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    command: >
      postgres
      -c shared_buffers=512MB
      -c max_connections=50
      -c work_mem=16MB

  app:
    build: .
    restart: always
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}
      - TZ=America/New_York
    depends_on:
      - db
volumes:
  oil_tracker_db_data: