<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects</title>
    <style>
        :root {
            --bg: #0d1117;
            --card-bg: #161b22;
            --text: #c9d1d9;
            --text-dim: #8b949e;
            --accent: #238636;
            /* GitHub Green */
            --border: #30363d;
            --link: #58a6ff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            line-height: 1.6;
            max-width: 850px;
            margin: 40px auto;
            padding: 0 20px;
            background: var(--bg);
            color: var(--text);
        }

        h1 {
            color: #f0f6fc;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        .card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 24px;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-2px);
            border-color: var(--text-dim);
        }

        .tag {
            background: rgba(35, 134, 54, 0.2);
            color: #3fb950;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            border: 1px solid rgba(63, 185, 80, 0.3);
        }

        .tag.upcoming {
            color: #8b949e;
            background: #21262d;
            border-color: var(--border);
        }

        h3 {
            margin-top: 15px;
            color: #f0f6fc;
        }

        p {
            color: var(--text-dim);
            font-size: 0.95rem;
        }

        .links {
            margin-top: 20px;
        }

        a {
            color: var(--link);
            text-decoration: none;
            padding: 0.4rem;
            font-size: 0.9rem;
        }

        a:hover {
            text-decoration: underline;
        }

        code {
            background: #21262d;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
        }

        .upcoming {
            border-left-color: #95a5a6;
            opacity: 0.7;
        }

        .api-status {
            font-size: 0.8rem;
            color: var(--text-dim);
        }
    </style>
</head>

<body>
<h1>Projects</h1>
<p>A collection of containerized data tools</p>

<div class="card">
    <span class="tag">ACTIVE</span>
    <h3>Heating Oil Tracker</h3>
    <p>Price scraping and analytics for heating oil.</p>
    <p>
        <a href="./oiltracker/api/docs">API Docs</a>|
        <a href="https://github.com/alexmroberts/oil-tracker">GitHub</a>
    </p>
    <p id="status-text" class="api-status"></p>
</div>

<div class="card" style="border-left-color: #95a5a6; opacity: 0.7;">
    <span class="tag upcoming">UPCOMING</span>
    <h3>Telemetry Hub</h3>
    <p>Future project for monitoring container uptime and utilization.</p>
</div>
</body>
<script type="text/javascript" src="./scripts/main.js"></script>
</html>
